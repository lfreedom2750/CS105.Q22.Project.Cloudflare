<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Run Model Capture Studio</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <main id="app">
        <aside id="panel">
            <div class="brand">
                <span class="brand-mark"></span>
                <div>
                    <h1>Capture Studio</h1>
                    <p>Chup anh model cho bao cao do hoa may tinh</p>
                </div>
            </div>

            <section class="control-group">
                <label for="assetSelect">Doi tuong</label>
                <select id="assetSelect"></select>
            </section>

            <section class="control-group">
                <label for="sceneModeSelect">Canh chup</label>
                <select id="sceneModeSelect">
                    <option value="studio" selected>Studio rieng</option>
                    <option value="game-spring">Canh game - Mua xuan</option>
                    <option value="game-summer">Canh game - Mua he</option>
                    <option value="game-autumn">Canh game - Mua thu</option>
                    <option value="game-winter">Canh game - Mua dong</option>
                </select>
            </section>

            <section class="control-group">
                <label for="backgroundSelect">Nen</label>
                <select id="backgroundSelect">
                    <option value="studio">Studio sang</option>
                    <option value="dark">Nen toi</option>
                    <option value="warm">Am vang</option>
                    <option value="transparent">Trong suot PNG</option>
                </select>
            </section>

            <section class="control-row">
                <label>
                    <input id="autoRotate" type="checkbox" checked>
                    Tu xoay
                </label>
                <label>
                    <input id="showGrid" type="checkbox" checked>
                    Luoi san
                </label>
            </section>

            <section class="control-group">
                <label for="modelScale">Phong to model</label>
                <input id="modelScale" type="range" min="0.25" max="2.5" step="0.05" value="1">
            </section>

            <section class="control-group">
                <label for="modelRotation">Xoay model</label>
                <select id="modelRotation">
                    <option value="0" selected>0 do</option>
                    <option value="90">90 do</option>
                    <option value="-90">-90 do</option>
                    <option value="180">180 do</option>
                    <option value="-180">-180 do</option>
                </select>
            </section>

            <section class="control-group">
                <label for="captureSize">Do phan giai xuat anh</label>
                <select id="captureSize">
                    <option value="1920x1080">1920 x 1080</option>
                    <option value="2560x1440" selected>2560 x 1440</option>
                    <option value="3000x2000">3000 x 2000</option>
                    <option value="3840x2160">3840 x 2160</option>
                    <option value="2000x2000">2000 x 2000</option>
                </select>
            </section>

            <div class="button-row">
                <button id="resetView" type="button">Reset view</button>
                <button id="downloadPng" type="button" class="primary">Tai PNG</button>
            </div>

            <section id="status" aria-live="polite">San sang.</section>
        </aside>

        <section id="viewport">
            <div id="caption">
                <strong id="captionTitle">Model</strong>
                <span id="captionSubtitle">Keo chuot de xoay, cuon de zoom</span>
            </div>
        </section>
    </main>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
