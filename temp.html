<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autumn Temple Run Source Match</title>

    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #ffd6a5;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        canvas {
            display: block;
        }

        #hud {
            position: fixed;
            top: 16px;
            left: 16px;
            color: #fff7ef;
            font-size: 14px;
            background: rgba(94, 50, 23, 0.72);
            border: 1px solid rgba(255, 206, 160, 0.32);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            padding: 14px 16px;
            border-radius: 14px;
            z-index: 10;
            max-width: 380px;
            line-height: 1.55;
        }

        #hud b {
            color: #ffd099;
        }
    </style>
</head>
<body>
    <div id="hud">Loading source-accurate autumn scene...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const AUTUMN = {
            bgColor: 0x0c1830,
            fogColor: 0x12233f,
            hemiLightColor: 0x3d5478,
            roadTexture: './public/assets/road_autumn.jpg',
            treeModel: './public/assets/autumn_maple.glb',
            treeScale: 5.0
        };

        const CONFIG = {
            ROAD_WIDTH: 14,
            TILE_LENGTH: 50,
            TREE_SPACING: 20,
            PATH_ASSETS: './public/assets/',
            LAMP_MODEL: './public/assets/simple_street_lamp.glb'
        };

        const hud = document.getElementById('hud');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(AUTUMN.bgColor);
        scene.fog = new THREE.FogExp2(AUTUMN.fogColor, 0.026);

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 8, 18);
        camera.lookAt(0, 3, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2.5, -35);
        controls.maxPolarAngle = Math.PI * 0.48;
        controls.minDistance = 10;
        controls.maxDistance = 90;

        const hemiLight = new THREE.HemisphereLight(AUTUMN.hemiLightColor, 0x0b1020, 0.72);
        scene.add(hemiLight);

        const sunLight = new THREE.DirectionalLight(0xb8cbff, 0.58);
        sunLight.position.set(5, 25, 10);
        sunLight.castShadow = true;
        sunLight.shadow.camera.left = -30;
        sunLight.shadow.camera.right = 30;
        sunLight.shadow.camera.top = 30;
        sunLight.shadow.camera.bottom = -30;
        sunLight.shadow.camera.near = 0.1;
        sunLight.shadow.camera.far = 120;
        sunLight.shadow.mapSize.set(2048, 2048);
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0xa8b7d8, 0.34);
        scene.add(ambientLight);

        const roadTexture = new THREE.TextureLoader().load(AUTUMN.roadTexture);
        roadTexture.wrapS = THREE.RepeatWrapping;
        roadTexture.wrapT = THREE.RepeatWrapping;
        roadTexture.repeat.set(1, CONFIG.TILE_LENGTH / 10);
        roadTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        roadTexture.colorSpace = THREE.SRGBColorSpace;

        const roadMaterial = new THREE.MeshStandardMaterial({
            map: roadTexture,
            color: 0xb6c0d0,
            roughness: 0.86,
            metalness: 0.03
        });

        const dirtMaterial = new THREE.MeshStandardMaterial({
            color: 0x384250,
            roughness: 1
        });

        const leafColors = [0xb6783f, 0xc4884e, 0x8f5c2d, 0x6e4723];
        const leafMaterialCache = leafColors.map((color) => (
            new THREE.MeshStandardMaterial({ color, roughness: 1 })
        ));

        const floorTiles = [];
        for (let i = -1; i < 10; i++) {
            const z = i * -CONFIG.TILE_LENGTH;
            const tile = new THREE.Mesh(
                new THREE.PlaneGeometry(CONFIG.ROAD_WIDTH, CONFIG.TILE_LENGTH),
                roadMaterial
            );
            tile.rotation.x = -Math.PI / 2;
            tile.position.set(0, 0, z);
            tile.receiveShadow = true;
            scene.add(tile);
            floorTiles.push(tile);
        }

        const shoulderLength = CONFIG.TILE_LENGTH * 11;
        const leftShoulder = new THREE.Mesh(
            new THREE.PlaneGeometry(24, shoulderLength),
            dirtMaterial
        );
        leftShoulder.rotation.x = -Math.PI / 2;
        leftShoulder.position.set(-CONFIG.ROAD_WIDTH / 2 - 12, -0.01, -200);
        leftShoulder.receiveShadow = true;
        scene.add(leftShoulder);

        const rightShoulder = leftShoulder.clone();
        rightShoulder.position.x = CONFIG.ROAD_WIDTH / 2 + 12;
        scene.add(rightShoulder);

        const createLeafScatter = (centerX, centerZ, width = 6, depth = 12, count = 18) => {
            const group = new THREE.Group();
            for (let index = 0; index < count; index++) {
                const leaf = new THREE.Mesh(
                    new THREE.CircleGeometry(0.08 + Math.random() * 0.14, 5),
                    leafMaterialCache[Math.floor(Math.random() * leafMaterialCache.length)]
                );
                leaf.rotation.x = -Math.PI / 2;
                leaf.rotation.z = Math.random() * Math.PI * 2;
                leaf.position.set(
                    centerX + (Math.random() - 0.5) * width,
                    0.03,
                    centerZ + (Math.random() - 0.5) * depth
                );
                group.add(leaf);
            }
            scene.add(group);
        };

        for (let row = 0; row < 28; row++) {
            const z = 10 - row * 10;
            createLeafScatter(-9.5, z, 5.5, 10, 12);
            createLeafScatter(9.5, z - 3, 5.5, 10, 12);
            createLeafScatter(0, z - 5, 10, 6, 6);
        }

        const trees = [];
        let treeTemplate = null;
        let lampTemplate = null;
        const lampInstances = [];
        const lampEffects = [];

        const gltfLoader = new GLTFLoader();

        const createFallbackTree = () => {
            const tree = new THREE.Group();

            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.3, 2, 8),
                new THREE.MeshStandardMaterial({ color: 0x331a00, roughness: 1 })
            );
            trunk.position.y = 1;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            tree.add(trunk);

            const foliage = new THREE.Mesh(
                new THREE.ConeGeometry(1.5, 4, 12),
                new THREE.MeshStandardMaterial({ color: 0xd97706, roughness: 1 })
            );
            foliage.position.y = 3.5;
            foliage.castShadow = true;
            foliage.receiveShadow = true;
            tree.add(foliage);

            tree.rotation.y = Math.random() * Math.PI * 2;
            return tree;
        };

        const normalizeModelToGround = (root) => {
            const box = new THREE.Box3().setFromObject(root);
            const center = box.getCenter(new THREE.Vector3());
            root.position.x -= center.x;
            root.position.z -= center.z;
            root.position.y -= box.min.y;
        };

        const createTreeInstance = () => {
            const tree = treeTemplate ? treeTemplate.clone(true) : createFallbackTree();

            if (treeTemplate) {
                tree.scale.set(AUTUMN.treeScale, AUTUMN.treeScale, AUTUMN.treeScale);
                tree.scale.multiplyScalar(0.9 + Math.random() * 0.2);
                tree.rotation.y = Math.random() * Math.PI * 2;
                tree.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
            }

            return tree;
        };

        const populateTrees = () => {
            const roadEdge = CONFIG.ROAD_WIDTH / 2;
            for (let i = 0; i < 40; i++) {
                const z = -i * CONFIG.TREE_SPACING;

                const leftTree = createTreeInstance();
                leftTree.position.set(-roadEdge + 0.8, 0, z);
                scene.add(leftTree);
                trees.push(leftTree);

                const rightTree = createTreeInstance();
                rightTree.position.set(roadEdge - 0.8, 0, z);
                scene.add(rightTree);
                trees.push(rightTree);
            }
        };

        const createLampGlow = (x, y, z) => {
            const spotLight = new THREE.SpotLight(0xffc06a, 12.5, 32, Math.PI * 0.32, 0.35, 1.2);
            spotLight.position.set(x + 0.05, y, z);
            spotLight.castShadow = true;
            spotLight.shadow.mapSize.set(1024, 1024);
            spotLight.shadow.bias = -0.00015;
            spotLight.shadow.camera.near = 0.5;
            spotLight.shadow.camera.far = 30;

            const target = new THREE.Object3D();
            target.position.set(x - 1.2, 0, z - 1.2);
            scene.add(target);

            spotLight.target = target;
            scene.add(spotLight);
            lampEffects.push({ light: spotLight, target, baseIntensity: 12.5 });
        };

        const setupLampTemplate = (root) => {
            normalizeModelToGround(root);

            const box = new THREE.Box3().setFromObject(root);
            const size = box.getSize(new THREE.Vector3());
            const scale = size.y > 0 ? 7 / size.y : 1;
            root.scale.setScalar(scale);

            root.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;

                    const materials = Array.isArray(child.material) ? child.material : [child.material];
                    materials.forEach((material) => {
                        if (!material) return;
                        material.needsUpdate = true;
                    });
                }
            });
        };

        const createFallbackLamp = () => {
            const lamp = new THREE.Group();

            const pole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12, 0.16, 5.8, 10),
                new THREE.MeshStandardMaterial({ color: 0x3f342c, roughness: 0.9, metalness: 0.2 })
            );
            pole.position.y = 2.9;
            pole.castShadow = true;
            pole.receiveShadow = true;
            lamp.add(pole);

            const arm = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.12, 0.12),
                new THREE.MeshStandardMaterial({ color: 0x4a3d33, roughness: 0.85, metalness: 0.15 })
            );
            arm.position.set(0.65, 5.45, 0);
            arm.castShadow = true;
            arm.receiveShadow = true;
            lamp.add(arm);

            const head = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.34, 0.5),
                new THREE.MeshStandardMaterial({ color: 0x2d241d, roughness: 0.8, metalness: 0.25 })
            );
            head.position.set(1.25, 5.2, 0);
            head.castShadow = true;
            head.receiveShadow = true;
            lamp.add(head);

            const bulb = new THREE.Mesh(
                new THREE.SphereGeometry(0.16, 12, 12),
                new THREE.MeshStandardMaterial({
                    color: 0xffd38a,
                    emissive: 0xffb347,
                    emissiveIntensity: 1.4,
                    roughness: 0.3,
                    metalness: 0
                })
            );
            bulb.position.set(1.25, 5.02, 0);
            bulb.castShadow = false;
            bulb.receiveShadow = false;
            lamp.add(bulb);

            lamp.rotation.y = Math.PI;
            return lamp;
        };

        const createLampInstance = () => {
            return lampTemplate ? lampTemplate.clone(true) : createFallbackLamp();
        };

        const placeLampRows = () => {
            const roadEdge = CONFIG.ROAD_WIDTH / 2;
            const lamp = createLampInstance();
            lamp.position.set(roadEdge - 1.1, 0, -6);
            lamp.rotation.y += Math.PI * 0.04;
            scene.add(lamp);
            lampInstances.push(lamp);
            createLampGlow(roadEdge + 0.95, 4.6, -5.7);
        };

        const dustParticles = [];
        for (let i = 0; i < 80; i++) {
            const particle = new THREE.Mesh(
                new THREE.SphereGeometry(0.03, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0xffdfa8, transparent: true, opacity: 0.35 })
            );
            particle.position.set(
                (Math.random() - 0.5) * 25,
                1 + Math.random() * 7,
                -Math.random() * 240
            );
            scene.add(particle);
            dustParticles.push(particle);
        }

        const loadTreePromise = new Promise((resolve) => {
            gltfLoader.load(
                AUTUMN.treeModel,
                (gltf) => {
                    treeTemplate = gltf.scene;
                    normalizeModelToGround(treeTemplate);
                    resolve(true);
                },
                undefined,
                () => {
                    treeTemplate = null;
                    resolve(false);
                }
            );
        });

        const loadLampPromise = new Promise((resolve, reject) => {
            gltfLoader.load(
                CONFIG.LAMP_MODEL,
                (gltf) => {
                    lampTemplate = gltf.scene;
                    setupLampTemplate(lampTemplate);
                    resolve(true);
                },
                (progress) => {
                    const percent = progress.total
                        ? Math.round(progress.loaded / progress.total * 100)
                        : 0;
                    hud.innerHTML = `Loading models... ${percent}%`;
                },
                (error) => reject(error)
            );
        });

        Promise.allSettled([loadTreePromise, loadLampPromise]).then((results) => {
            const treeLoaded = results[0].status === 'fulfilled' ? results[0].value : false;
            const lampLoaded = results[1].status === 'fulfilled';
            const missingAssets = [];

            if (!treeLoaded) {
                missingAssets.push(AUTUMN.treeModel);
            }

            if (!lampLoaded) {
                missingAssets.push(CONFIG.LAMP_MODEL);
            }

            populateTrees();
            placeLampRows();

            if (!lampLoaded) {
                console.error('Street lamp model failed to load.', results[1].reason);
            }

            hud.innerHTML = `
                <b>Autumn scene using available assets</b><br>
                Season config: ` + 'bg/fog/hemi/road/tree from game' + `<br>
                Road width: ${CONFIG.ROAD_WIDTH}<br>
                Tile length: ${CONFIG.TILE_LENGTH}<br>
                Tree spacing: ${CONFIG.TREE_SPACING}<br>
                Tree model: ${treeLoaded ? 'autumn_maple.glb' : 'procedural fallback tree'}<br>
                Street lamps: ${lampInstances.length} (${lampLoaded ? 'model asset' : 'procedural fallback'})<br>
                Missing assets: ${missingAssets.length ? missingAssets.join(', ') : 'none'}
            `;
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const time = performance.now() * 0.001;

            dustParticles.forEach((particle, index) => {
                particle.position.x += Math.sin(time * 0.6 + index) * 0.0015;
                particle.position.y += Math.cos(time * 0.8 + index) * 0.0008;
            });

            lampEffects.forEach((effect, index) => {
                effect.light.intensity = effect.baseIntensity + Math.sin(time * 2.6 + index) * 0.3;
            });

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
